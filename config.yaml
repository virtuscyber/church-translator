audio:
  input_device: null          # null = system default; set to device name or index
  output_device: null         # null = system default; set to device name or index
  sample_rate: 48000          # Dante standard
  channels: 1                 # Mono for speech
  chunk_duration_sec: 4       # Seconds of audio per STT chunk

transcription:
  provider: "openai"          # "openai" or "elevenlabs"
  model: "gpt-4o-transcribe"  # OpenAI model (used when provider=openai)
  language: "uk"              # Ukrainian (ISO 639-1)

translation:
  model: "gpt-4o"
  temperature: 0.3
  prompt_file: "prompts/biblical_translator.txt"

synthesis:
  provider: "elevenlabs"      # "elevenlabs" or "openai"
  speed: 1.0                  # Speech speed multiplier (ElevenLabs: ~0.7-1.2, OpenAI: 0.25-4.0)
  elevenlabs:
    model: "eleven_turbo_v2_5"
    voice_id: "pNInz6obpgDQGcFmaJgB"   # Adam
    stability: 0.7
    similarity_boost: 0.8
  openai:
    model: "gpt-4o-mini-tts"
    voice: "onyx"

pipeline:
  min_chunk_sec: 2.0
  max_chunk_sec: 8.0
  silence_threshold_sec: 0.6
  vad_aggressiveness: 2 # bump to 3 if noisy

output:
  mode: "sounddevice"         # "sounddevice", "dante", or "both"
  #output_device: "Dante Virtual Soundcard"  # Used if mode includes "sounddevice"
  #stream_name: "Church Translation EN"
  #multicast_address: "239.69.0.1"
#  multicast_address: "239.255.0.1"
  port: 5004
  ttl: 32
