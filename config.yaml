audio:
  input_device: null          # null = system default; set to device name or index
  output_device: null         # null = system default; set to device name or index
  sample_rate: 48000          # Dante standard
  channels: 1                 # Mono for speech
  chunk_duration_sec: 4       # Seconds of audio per STT chunk

transcription:
  provider: "elevenlabs"      # "elevenlabs" = Scribe v2 (best Ukrainian WER);
                              #   "openai" = gpt-4o-transcribe. OpenAI is the
                              #   automatic fallback if the primary fails.
  elevenlabs_model: "scribe_v2"
  model: "gpt-4o-transcribe"  # used when provider = openai (and as fallback)
  language: "uk"              # Ukrainian (ISO 639-1)
  temperature: 0.0            # 0 = deterministic; reduces STT hallucination
  gate_silence: true          # Skip near-silent chunks before STT (kills the
                              #   #1 source of phantom transcripts on dead air)
  silence_peak: 0.008         # Peak amplitude (0-1) below which a chunk counts
                              #   as silence. Lower if quiet speech gets dropped.
  min_duration_sec: 0.4       # Drop chunks shorter than this
  filter_hallucinations: true # Drop known artifacts ("thanks for watching")
                              #   and repetition loops

translation:
  model: "gpt-4o"
  temperature: 0.0            # 0 = faithful, deterministic translation
  prompt_file: "prompts/biblical_translator.txt"
  filter_hallucinations: true

synthesis:
  provider: "elevenlabs"      # "elevenlabs" or "openai"
  speed: 1.0                  # Playback speed. ElevenLabs ~0.7-1.2; try 1.1-1.15
                              #   so the translation keeps pace with the speaker.
  elevenlabs:
    model: "eleven_flash_v2_5"  # ~75ms latency, best for live. eleven_v3 is
                                #   higher quality but too slow for real time.
    voice_id: "pNInz6obpgDQGcFmaJgB"   # Adam
    stability: 0.7
    similarity_boost: 0.8
  openai:
    model: "gpt-4o-mini-tts"
    voice: "onyx"

pipeline:
  min_chunk_sec: 2.0
  max_chunk_sec: 8.0
  silence_threshold_sec: 0.6
  vad_aggressiveness: 2 # bump to 3 if noisy

output:
  mode: "sounddevice"         # "sounddevice", "dante", or "both"
  #output_device: "Dante Virtual Soundcard"  # Used if mode includes "sounddevice"
  #stream_name: "Church Translation EN"
  #multicast_address: "239.69.0.1"
#  multicast_address: "239.255.0.1"
  port: 5004
  ttl: 32
