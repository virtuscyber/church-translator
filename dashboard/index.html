<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Church Live Translation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f1419;
            --surface: #1a2332;
            --surface-2: #243044;
            --border: #2d3f56;
            --text: #e8edf4;
            --text-dim: #8899aa;
            --accent: #4f9cf7;
            --accent-glow: rgba(79, 156, 247, 0.15);
            --green: #4ade80;
            --green-glow: rgba(74, 222, 128, 0.15);
            --red: #f87171;
            --amber: #fbbf24;
            --uk-flag: #0057b7;
            --uk-yellow: #ffd700;
            --radius: 16px;
            --radius-sm: 10px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ── Header ─────────────────────────────── */
        .header {
            background: linear-gradient(135deg, var(--surface) 0%, var(--surface-2) 100%);
            border-bottom: 1px solid var(--border);
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            font-size: 32px;
            line-height: 1;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .header h1 span {
            color: var(--text-dim);
            font-weight: 400;
            font-size: 15px;
            display: block;
        }

        /* ── Status Badge ───────────────────────── */
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-badge.stopped {
            background: var(--surface-2);
            color: var(--text-dim);
            border: 1px solid var(--border);
        }

        .status-badge.running {
            background: var(--green-glow);
            color: var(--green);
            border: 1px solid rgba(74, 222, 128, 0.3);
        }

        .status-badge.error {
            background: rgba(248, 113, 113, 0.15);
            color: var(--red);
            border: 1px solid rgba(248, 113, 113, 0.3);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }

        .status-badge.running .status-dot {
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
        }

        /* ── Main Layout ────────────────────────── */
        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
            display: grid;
            gap: 24px;
        }

        /* ── Stats Cards ────────────────────────── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 24px;
            text-align: center;
        }

        .stat-card .label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--accent);
        }

        .stat-card .unit {
            font-size: 14px;
            color: var(--text-dim);
            font-weight: 400;
        }

        /* ── Controls ───────────────────────────── */
        .controls {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
        }

        .controls h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .file-input-group {
            display: flex;
            gap: 12px;
            align-items: stretch;
        }

        .file-input-group input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            color: var(--text);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .file-input-group input:focus {
            border-color: var(--accent);
        }

        .file-input-group input::placeholder {
            color: var(--text-dim);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: #3d8de5;
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-danger {
            background: rgba(248, 113, 113, 0.15);
            color: var(--red);
            border: 1px solid rgba(248, 113, 113, 0.3);
        }

        .btn-danger:hover {
            background: rgba(248, 113, 113, 0.25);
        }

        /* ── Progress Bar ───────────────────────── */
        .progress-container {
            margin-top: 16px;
            display: none;
        }

        .progress-container.active {
            display: block;
        }

        .progress-bar-bg {
            height: 6px;
            background: var(--bg);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--green));
            border-radius: 3px;
            transition: width 0.5s ease;
            width: 0%;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-dim);
            margin-top: 8px;
        }

        /* ── Transcript ─────────────────────────── */
        .transcript-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .transcript-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .transcript-header h2 {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .transcript-count {
            background: var(--surface-2);
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 13px;
            color: var(--text-dim);
        }

        .transcript-body {
            max-height: 500px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .transcript-empty {
            padding: 60px 24px;
            text-align: center;
            color: var(--text-dim);
        }

        .transcript-empty .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .transcript-entry {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            animation: slideIn 0.3s ease;
        }

        .transcript-entry:last-child {
            border-bottom: none;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .transcript-entry .meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 12px;
            color: var(--text-dim);
        }

        .transcript-entry .seq {
            background: var(--surface-2);
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 11px;
        }

        .transcript-entry .latency {
            color: var(--green);
        }

        .lang-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 6px;
        }

        .lang-flag {
            flex-shrink: 0;
            width: 28px;
            height: 20px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            margin-top: 3px;
        }

        .flag-uk {
            background: linear-gradient(180deg, var(--uk-flag) 50%, var(--uk-yellow) 50%);
            color: white;
        }

        .flag-en {
            background: linear-gradient(180deg, #c8102e 33%, white 33%, white 66%, #012169 66%);
            color: white;
        }

        .lang-text {
            flex: 1;
            font-size: 15px;
            line-height: 1.5;
        }

        .lang-text.ukrainian {
            color: var(--text-dim);
            font-style: italic;
        }

        .lang-text.english {
            color: var(--text);
            font-weight: 500;
        }

        /* ── Live Indicator ─────────────────────── */
        .live-indicator {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: rgba(248, 113, 113, 0.15);
            border: 1px solid rgba(248, 113, 113, 0.3);
            border-radius: 100px;
            color: var(--red);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .live-indicator.active {
            display: flex;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--red);
            animation: pulse 1s ease-in-out infinite;
        }

        /* ── Notification Toast ─────────────────── */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 20px;
            font-size: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 100;
            max-width: 400px;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* ── Scrollbar ──────────────────────────── */
        .transcript-body::-webkit-scrollbar { width: 6px; }
        .transcript-body::-webkit-scrollbar-track { background: transparent; }
        .transcript-body::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        /* ── Connected indicator ────────────────── */
        .connection-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--red);
            transition: background 0.3s;
        }

        .connection-dot.connected {
            background: var(--green);
        }

        /* ── Responsive ─────────────────────────── */
        @media (max-width: 768px) {
            .header { padding: 16px; flex-wrap: wrap; }
            .main { padding: 16px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .file-input-group { flex-direction: column; }
            .stat-card .value { font-size: 28px; }
        }
    </style>
</head>
<body>

<!-- Header -->
<header class="header">
    <div class="header-left">
        <div class="logo">⛪</div>
        <h1>
            Church Live Translation
            <span>Ukrainian → English</span>
        </h1>
    </div>
    <div style="display: flex; align-items: center; gap: 12px;">
        <div class="live-indicator" id="liveIndicator">
            <div class="live-dot"></div>
            TRANSLATING
        </div>
        <div class="status-badge stopped" id="statusBadge">
            <div class="status-dot"></div>
            <span id="statusText">Ready</span>
        </div>
        <div class="connection-dot" id="connectionDot" title="WebSocket connection"></div>
    </div>
</header>

<!-- Main Content -->
<main class="main">

    <!-- Stats Row -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="label">Chunks Translated</div>
            <div class="value" id="statChunks">0</div>
        </div>
        <div class="stat-card">
            <div class="label">Avg Latency</div>
            <div class="value" id="statLatency">—<span class="unit">s</span></div>
        </div>
        <div class="stat-card">
            <div class="label">Runtime</div>
            <div class="value" id="statRuntime">—<span class="unit">s</span></div>
        </div>
        <div class="stat-card">
            <div class="label">Status</div>
            <div class="value" id="statStatus" style="font-size: 18px; color: var(--text-dim);">Ready to start</div>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <h2>🎛️ Test with Audio File</h2>
        <div class="file-input-group">
            <input type="text" id="fileInput" placeholder="Path to audio file (e.g. samples/sermon_clip.wav)" value="samples/sermon_clip.wav">
            <button class="btn btn-primary" id="startBtn" onclick="startTest()">
                ▶ Translate
            </button>
            <button class="btn btn-danger" id="stopBtn" onclick="stopTest()" style="display:none;">
                ⏹ Stop
            </button>
        </div>
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressFill"></div>
            </div>
            <div class="progress-label">
                <span id="progressText">Processing...</span>
                <span id="progressPct">0%</span>
            </div>
        </div>
    </div>

    <!-- Transcript -->
    <div class="transcript-section">
        <div class="transcript-header">
            <h2>📜 Live Transcript</h2>
            <span class="transcript-count" id="transcriptCount">0 segments</span>
        </div>
        <div class="transcript-body" id="transcriptBody">
            <div class="transcript-empty" id="transcriptEmpty">
                <div class="icon">🎤</div>
                <p>No translations yet</p>
                <p style="font-size: 13px; margin-top: 4px;">Enter an audio file path above and click Translate to begin</p>
            </div>
        </div>
    </div>

</main>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
    let ws = null;
    let reconnectTimer = null;

    // ── WebSocket ─────────────────────────────────
    function connectWS() {
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${location.host}/ws`);
        
        ws.onopen = () => {
            document.getElementById('connectionDot').classList.add('connected');
            console.log('WebSocket connected');
        };

        ws.onclose = () => {
            document.getElementById('connectionDot').classList.remove('connected');
            reconnectTimer = setTimeout(connectWS, 2000);
        };

        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            handleMessage(msg);
        };

        ws.onerror = () => {
            document.getElementById('connectionDot').classList.remove('connected');
        };
    }

    function handleMessage(msg) {
        switch (msg.type) {
            case 'init':
                updateStatus(msg.status);
                if (msg.transcript && msg.transcript.length > 0) {
                    msg.transcript.forEach(entry => addTranscriptEntry(entry));
                }
                break;

            case 'status':
                updateStatus(msg.status);
                if (msg.stats) updateStats(msg.stats);
                if (msg.status === 'completed') {
                    showToast('✅ Translation complete!');
                }
                break;

            case 'stt':
                document.getElementById('statStatus').textContent = `🇺🇦 Listening... (${msg.seq}/${msg.total})`;
                document.getElementById('statStatus').style.color = 'var(--uk-flag)';
                break;

            case 'translation':
                addTranscriptEntry(msg.entry);
                updateProgress(msg.progress);
                if (msg.stats) updateStats(msg.stats);
                break;

            case 'error':
                updateStatus('error');
                showToast('❌ ' + msg.message);
                break;

            case 'info':
                showToast('ℹ️ ' + msg.message);
                break;
        }
    }

    // ── UI Updates ────────────────────────────────

    function updateStatus(status) {
        const badge = document.getElementById('statusBadge');
        const text = document.getElementById('statusText');
        const live = document.getElementById('liveIndicator');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statStatus = document.getElementById('statStatus');
        const progress = document.getElementById('progressContainer');

        badge.className = 'status-badge ' + status;

        switch (status) {
            case 'running':
                text.textContent = 'Translating';
                live.classList.add('active');
                startBtn.style.display = 'none';
                stopBtn.style.display = 'flex';
                progress.classList.add('active');
                statStatus.textContent = 'Translating...';
                statStatus.style.color = 'var(--green)';
                break;
            case 'stopped':
                text.textContent = 'Ready';
                live.classList.remove('active');
                startBtn.style.display = 'flex';
                stopBtn.style.display = 'none';
                progress.classList.remove('active');
                statStatus.textContent = 'Ready to start';
                statStatus.style.color = 'var(--text-dim)';
                break;
            case 'completed':
                text.textContent = 'Done';
                live.classList.remove('active');
                startBtn.style.display = 'flex';
                stopBtn.style.display = 'none';
                statStatus.textContent = '✅ Complete';
                statStatus.style.color = 'var(--green)';
                setTimeout(() => {
                    progress.classList.remove('active');
                    badge.className = 'status-badge stopped';
                    text.textContent = 'Ready';
                }, 3000);
                break;
            case 'error':
                text.textContent = 'Error';
                live.classList.remove('active');
                startBtn.style.display = 'flex';
                stopBtn.style.display = 'none';
                progress.classList.remove('active');
                statStatus.textContent = '❌ Error';
                statStatus.style.color = 'var(--red)';
                break;
        }
    }

    function updateStats(stats) {
        if (stats.chunks_processed !== undefined) {
            document.getElementById('statChunks').textContent = stats.chunks_processed;
        }
        if (stats.avg_latency !== undefined) {
            document.getElementById('statLatency').innerHTML = stats.avg_latency + '<span class="unit">s</span>';
        }
        if (stats.total_runtime !== undefined) {
            document.getElementById('statRuntime').innerHTML = stats.total_runtime + '<span class="unit">s</span>';
        }
    }

    function updateProgress(pct) {
        const fill = document.getElementById('progressFill');
        const text = document.getElementById('progressPct');
        const percent = Math.round(pct * 100);
        fill.style.width = percent + '%';
        text.textContent = percent + '%';
    }

    function addTranscriptEntry(entry) {
        const body = document.getElementById('transcriptBody');
        const empty = document.getElementById('transcriptEmpty');
        if (empty) empty.remove();

        const div = document.createElement('div');
        div.className = 'transcript-entry';
        div.innerHTML = `
            <div class="meta">
                <span class="seq">#${entry.seq}</span>
                <span class="latency">⚡ ${entry.latency}s</span>
            </div>
            <div class="lang-row">
                <div class="lang-flag flag-uk">UA</div>
                <div class="lang-text ukrainian">${escapeHtml(entry.ukrainian)}</div>
            </div>
            <div class="lang-row">
                <div class="lang-flag flag-en">EN</div>
                <div class="lang-text english">${escapeHtml(entry.english)}</div>
            </div>
        `;

        body.appendChild(div);
        body.scrollTop = body.scrollHeight;

        const count = body.querySelectorAll('.transcript-entry').length;
        document.getElementById('transcriptCount').textContent = count + ' segment' + (count !== 1 ? 's' : '');
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 4000);
    }

    // ── Actions ───────────────────────────────────

    async function startTest() {
        const filePath = document.getElementById('fileInput').value.trim();
        if (!filePath) {
            showToast('⚠️ Please enter a file path');
            return;
        }

        // Clear previous transcript
        const body = document.getElementById('transcriptBody');
        body.innerHTML = '';
        document.getElementById('transcriptCount').textContent = '0 segments';
        document.getElementById('statChunks').textContent = '0';
        document.getElementById('progressFill').style.width = '0%';
        document.getElementById('progressPct').textContent = '0%';

        try {
            const res = await fetch('/api/test-file', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ file_path: filePath }),
            });
            const data = await res.json();
            if (data.error) {
                showToast('❌ ' + data.error);
            }
        } catch (err) {
            showToast('❌ Failed to start: ' + err.message);
        }
    }

    async function stopTest() {
        try {
            await fetch('/api/stop', { method: 'POST' });
        } catch (err) {
            showToast('❌ Failed to stop: ' + err.message);
        }
    }

    // ── Init ──────────────────────────────────────
    connectWS();
</script>

</body>
</html>
