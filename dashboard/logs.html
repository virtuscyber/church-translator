<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Logs — Church Translator</title>
<style>
    :root {
        --bg: #0f1117;
        --surface: #1a1d27;
        --surface2: #242736;
        --border: #2e3144;
        --text: #e2e4e9;
        --text-dim: #8b8fa3;
        --accent: #6c8cff;
        --accent-dim: #4a6adf;
        --green: #4ade80;
        --red: #f87171;
        --orange: #fb923c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
    }

    .header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 16px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .header h1 {
        font-size: 1.25em;
        font-weight: 600;
    }

    .header a {
        color: var(--accent);
        text-decoration: none;
        font-size: 0.9em;
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
    }

    /* Session list */
    .session-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .session-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 14px 18px;
        cursor: pointer;
        transition: border-color 0.2s;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .session-card:hover {
        border-color: var(--accent);
    }

    .session-card.active {
        border-color: var(--accent);
        background: var(--surface2);
    }

    .session-meta {
        display: flex;
        gap: 16px;
        align-items: center;
    }

    .session-mode {
        font-size: 0.75em;
        padding: 2px 8px;
        border-radius: 4px;
        font-weight: 600;
        text-transform: uppercase;
    }

    .session-mode.live { background: rgba(248,113,113,0.15); color: var(--red); }
    .session-mode.file { background: rgba(108,140,255,0.15); color: var(--accent); }

    .session-date { color: var(--text-dim); font-size: 0.85em; }
    .session-chunks { color: var(--text-dim); font-size: 0.85em; }
    .session-langs { font-size: 0.85em; }

    /* Detail view */
    .detail-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
        gap: 12px;
    }

    .detail-header h2 { font-size: 1.1em; }

    .btn {
        padding: 6px 14px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        font-size: 0.85em;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 4px;
    }

    .btn:hover { border-color: var(--accent); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Chunk table */
    .chunks-table {
        width: 100%;
        border-collapse: collapse;
    }

    .chunks-table th {
        background: var(--surface2);
        padding: 10px 14px;
        text-align: left;
        font-size: 0.8em;
        font-weight: 600;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 1;
    }

    .chunks-table td {
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
        font-size: 0.9em;
        vertical-align: top;
        line-height: 1.5;
    }

    .chunks-table tr:hover td {
        background: var(--surface);
    }

    .col-seq { width: 50px; text-align: center; color: var(--text-dim); }
    .col-latency { width: 70px; text-align: center; }
    .col-stt { width: 35%; }
    .col-translation { width: 35%; }
    .col-tts { width: 30%; }

    .refined-tag {
        font-size: 0.7em;
        color: var(--accent);
        margin-left: 4px;
        cursor: help;
    }

    .latency-badge {
        font-size: 0.8em;
        padding: 2px 6px;
        border-radius: 4px;
        background: var(--surface2);
    }

    .latency-fast { color: var(--green); }
    .latency-mid { color: var(--orange); }
    .latency-slow { color: var(--red); }

    .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-dim);
    }

    .empty-state h3 { margin-bottom: 8px; color: var(--text); }

    .layout {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 24px;
        align-items: start;
    }

    @media (max-width: 900px) {
        .layout { grid-template-columns: 1fr; }
    }

    .table-wrap {
        overflow-x: auto;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
    }
</style>
</head>
<body>

<div class="header">
    <h1>📋 Session Logs</h1>
    <a href="/">← Back to Dashboard</a>
</div>

<div class="container">
    <div class="layout">
        <div>
            <div id="sessionList" class="session-list">
                <div class="empty-state">Loading sessions...</div>
            </div>
        </div>
        <div id="detailPanel">
            <div class="empty-state">
                <h3>Select a session</h3>
                <p>Choose a session from the left to view the side-by-side STT, translation, and TTS log.</p>
            </div>
        </div>
    </div>
</div>

<script>
    let sessions = [];
    let activeSessionId = null;

    function formatDate(iso) {
        if (!iso) return '—';
        const d = new Date(iso);
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) +
            ' ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    async function loadSessions() {
        try {
            const res = await fetch('/api/sessions?limit=100');
            const data = await res.json();
            sessions = data.sessions || [];
            renderSessionList();
        } catch (e) {
            document.getElementById('sessionList').innerHTML =
                '<div class="empty-state">Failed to load sessions</div>';
        }
    }

    function renderSessionList() {
        const el = document.getElementById('sessionList');
        if (sessions.length === 0) {
            el.innerHTML = '<div class="empty-state"><h3>No sessions yet</h3><p>Run a translation to generate session logs.</p></div>';
            return;
        }

        el.innerHTML = sessions.map(s => {
            const langs = [s.config?.source_lang, s.config?.target_lang].filter(Boolean).join(' → ') || '';
            return `<div class="session-card ${s.session_id === activeSessionId ? 'active' : ''}"
                         onclick="loadSession('${escapeHtml(s.session_id)}')">
                <div>
                    <div class="session-meta">
                        <span class="session-mode ${s.mode}">${s.mode}</span>
                        <span class="session-date">${formatDate(s.started_at)}</span>
                    </div>
                    <div class="session-langs" style="margin-top:4px;">${escapeHtml(langs)}</div>
                </div>
                <span class="session-chunks">${s.chunk_count} chunks</span>
            </div>`;
        }).join('');
    }

    async function loadSession(sessionId) {
        activeSessionId = sessionId;
        renderSessionList();

        const panel = document.getElementById('detailPanel');
        panel.innerHTML = '<div class="empty-state">Loading...</div>';

        try {
            const res = await fetch('/api/sessions/' + encodeURIComponent(sessionId));
            const data = await res.json();
            if (data.error) {
                panel.innerHTML = '<div class="empty-state">' + escapeHtml(data.error) + '</div>';
                return;
            }
            renderDetail(data);
        } catch (e) {
            panel.innerHTML = '<div class="empty-state">Failed to load session</div>';
        }
    }

    function renderDetail(data) {
        const panel = document.getElementById('detailPanel');
        const cfg = data.config || {};
        const langs = [cfg.source_language, cfg.target_language].filter(Boolean).join(' → ') || '—';

        let html = `
            <div class="detail-header">
                <div>
                    <h2>Session: ${escapeHtml(data.session_id)}</h2>
                    <div style="color:var(--text-dim);font-size:0.85em;margin-top:4px;">
                        ${escapeHtml(data.mode.toUpperCase())} · ${escapeHtml(langs)} ·
                        ${data.chunks.length} chunks ·
                        ${formatDate(data.started_at)} – ${data.ended_at ? formatDate(data.ended_at) : 'in progress'}
                    </div>
                </div>
                <div style="display:flex;gap:8px;">
                    <a class="btn" href="/api/sessions/${encodeURIComponent(data.session_id)}/export" download>📥 Export .txt</a>
                    <a class="btn" href="/api/sessions/${encodeURIComponent(data.session_id)}" target="_blank">{ } JSON</a>
                </div>
            </div>
        `;

        if (data.chunks.length === 0) {
            html += '<div class="empty-state">No chunks recorded in this session.</div>';
            panel.innerHTML = html;
            return;
        }

        html += `<div class="table-wrap"><table class="chunks-table">
            <thead>
                <tr>
                    <th class="col-seq">#</th>
                    <th class="col-latency">Latency</th>
                    <th class="col-stt">🎤 STT (Source)</th>
                    <th class="col-translation">🌐 Translation</th>
                    <th class="col-tts">🔊 TTS Output</th>
                </tr>
            </thead>
            <tbody>`;

        for (const chunk of data.chunks) {
            const latency = chunk.latency_sec || 0;
            const latencyClass = latency < 5 ? 'latency-fast' : latency < 10 ? 'latency-mid' : 'latency-slow';

            const translationCell = chunk.refined
                ? `${escapeHtml(chunk.translation)}<br><span class="refined-tag" title="Refined version sent to TTS">✨ refined → ${escapeHtml(chunk.refined)}</span>`
                : escapeHtml(chunk.translation);

            html += `<tr>
                <td class="col-seq">${chunk.seq}</td>
                <td class="col-latency"><span class="latency-badge ${latencyClass}">${latency}s</span></td>
                <td class="col-stt">${escapeHtml(chunk.stt || '')}</td>
                <td class="col-translation">${translationCell}</td>
                <td class="col-tts">${escapeHtml(chunk.tts_text || '')}</td>
            </tr>`;
        }

        html += '</tbody></table></div>';
        panel.innerHTML = html;
    }

    // Init
    loadSessions();
</script>

</body>
</html>
